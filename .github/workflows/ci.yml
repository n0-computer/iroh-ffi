name: CI

# Rust core only — per-language CI lives in sibling workflows:
#   ci_python.yml, ci_swift.yml, ci_kotlin.yml, ci_js.yml

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  IROH_FORCE_STAGING_RELAYS: "1"

jobs:
  rust:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    name: Rust - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu-latest, macOS-arm-latest, windows-latest]
        include:
          - name: ubuntu-latest
            runner: [self-hosted, linux, X64]
          - name: macOS-arm-latest
            runner: [self-hosted, macOS, ARM64]
          - name: windows-latest
            runner: [windows-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: davidB/rust-cargo-make@v1
      - name: cargo make test-rust
        run: cargo make test-rust

  fmt-clippy-docs:
    timeout-minutes: 30
    name: fmt + clippy + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: davidB/rust-cargo-make@v1
      - run: cargo make format-check
      - run: cargo make clippy
      - run: cargo make docs
