name: CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - feat-1-0

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  IROH_FORCE_STAGING_RELAYS: "1"

jobs:
  rust:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    name: Rust - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu-latest, macOS-arm-latest, windows-latest]
        include:
          - name: ubuntu-latest
            runner: [linux, X64]
          - name: macOS-arm-latest
            runner: [macOS, ARM64]
          - name: windows-latest
            runner: [windows-latest]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: davidB/rust-cargo-make@v1
      - name: cargo make test-rust
        run: cargo make test-rust

  fmt-clippy-docs:
    timeout-minutes: 30
    name: fmt + clippy + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: davidB/rust-cargo-make@v1
      - run: cargo make format-check
      - run: cargo make clippy
      - run: cargo make docs

  python:
    name: Python - Build and test
    timeout-minutes: 30
    runs-on: [linux, x64]
    steps:
      - uses: actions/checkout@master
      - uses: dtolnay/rust-toolchain@stable
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up virtualenv
        run: |
          pip install virtualenv
          virtualenv venv
          source venv/bin/activate
          pip install setuptools pytest pytest-asyncio "maturin[patchelf]" uniffi-bindgen
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH
      - name: cargo make test-python
        run: cargo make test-python

  js:
    name: JS - Build and test
    timeout-minutes: 30
    runs-on: [macOS, ARM64]
    steps:
      - uses: actions/checkout@master
      - uses: dtolnay/rust-toolchain@stable
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (yarn)
        run: corepack enable
      - name: cargo make test-js
        run: cargo make test-js

  swift:
    name: Swift - Full xcframework build + test (iOS + macOS)
    timeout-minutes: 60
    runs-on: [macOS, ARM64]
    steps:
      - uses: actions/checkout@master
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - name: cargo make test-swift
        run: cargo make test-swift

  kotlin:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    name: Kotlin - JVM test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu-latest, macOS-arm-latest]
        include:
          - name: ubuntu-latest
            runner: [linux, X64]
          - name: macOS-arm-latest
            runner: [macOS, ARM64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: cargo make test-kotlin
        run: cargo make test-kotlin

  kotlin-android:
    name: Kotlin - Android cross-build
    timeout-minutes: 45
    runs-on: [linux, X64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        uses: arqu/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r23
          add-to-path: true
      - name: cargo make kotlin-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo make kotlin-android
