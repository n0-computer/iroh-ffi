name: docs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Allow one concurrent deployment; never cancel an in-progress Pages deploy.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  IROH_FORCE_STAGING_RELAYS: "1"

jobs:
  build:
    name: Build docs site (all languages + landing)
    timeout-minutes: 60
    # Swift DocC needs Xcode, so the whole site is built on the macOS runner
    # (it also covers Python/JS/Kotlin).
    runs-on: [macOS, ARM64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up virtualenv (Python docs build the extension via maturin)
        run: |
          pip install virtualenv
          virtualenv venv
          source venv/bin/activate
          pip install setuptools "maturin[patchelf]" uniffi-bindgen pdoc pyyaml
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
          echo "$PWD/venv/bin" >> $GITHUB_PATH
      - name: cargo make docs-site
        run: cargo make docs-site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
