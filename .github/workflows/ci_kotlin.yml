name: CI Kotlin

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  IROH_FORCE_STAGING_RELAYS: "1"

jobs:
  kotlin:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    name: Kotlin - JVM test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu-latest, macOS-arm-latest]
        include:
          - name: ubuntu-latest
            runner: [self-hosted, linux, X64]
          - name: macOS-arm-latest
            runner: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: cargo make test-kotlin
        run: cargo make test-kotlin

  kotlin-android:
    name: Kotlin - Android cross-build
    timeout-minutes: 45
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        uses: arqu/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r23
          add-to-path: true
      - name: cargo make kotlin-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo make kotlin-android
