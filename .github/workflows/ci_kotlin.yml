name: CI Kotlin

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  IROH_FORCE_STAGING_RELAYS: "1"

jobs:
  kotlin:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    name: Kotlin - JVM test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu-latest, macOS-arm-latest]
        include:
          - name: ubuntu-latest
            runner: [self-hosted, linux, X64]
          - name: macOS-arm-latest
            runner: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: cargo make test-kotlin
        run: cargo make test-kotlin

  kotlin-android:
    name: Kotlin - Android cross-build
    timeout-minutes: 45
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        uses: arqu/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r23
          add-to-path: true
      - name: cargo make kotlin-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo make kotlin-android

  # PR-time Android consumer smoke. Cross-builds the natives, stages them
  # under lib/<abi>/, then runs the IrohSmokeTest on an emulator. Mirrors the
  # release.yml verify-kotlin-android-consumer job — same gate, fires on every
  # PR instead of waiting for a release tag.
  kotlin-android-consumer-smoke:
    name: Kotlin - Android consumer smoke (emulator)
    timeout-minutes: 45
    # ubuntu-latest has /dev/kvm via nested-virt — required by
    # android-emulator-runner. The self-hosted linux runner used by
    # kotlin-android above doesn't have KVM enabled.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        uses: arqu/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r23
          add-to-path: true
      - name: Install cargo-ndk
        run: cargo install --version 3.5.4 cargo-ndk --locked
      - name: Cross-build + stage Android natives
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -eu
          # Stage at lib/<abi>/ — where AGP's mergeNativeLibsTask scans JAR
          # deps to pull natives into a consumer APK.
          cargo ndk -o ./_android_libs \
            -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 \
            build --release --lib -p iroh-ffi
          RES=kotlin/lib/src/main/resources
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            install -D -m644 "./_android_libs/$abi/libiroh_ffi.so" "$RES/lib/$abi/libiroh_ffi.so"
          done
          # Composite-build :lib:jar needs the bindings file.
          cargo make bindgen-kotlin
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Android consumer smoke on emulator
        # API 35 / x86_64 / google_apis mirrors n0-computer/iroh's android job.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-metrics
          disable-animations: true
          script: |
            set -eu
            V=$(sed -nE 's/.*coordinates\("computer\.iroh", "iroh", "([^"]+)"\).*/\1/p' kotlin/lib/build.gradle.kts)
            echo "iroh version under test: $V"
            cd kotlin/android-smoke
            ./gradlew :app:connectedDebugAndroidTest -PirohVersion="$V" --no-daemon --console=plain
