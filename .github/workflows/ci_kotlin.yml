name: CI Kotlin

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  IROH_FORCE_STAGING_RELAYS: "1"

jobs:
  kotlin:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    name: Kotlin - JVM test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu-latest, macOS-arm-latest]
        include:
          - name: ubuntu-latest
            runner: [self-hosted, linux, X64]
          - name: macOS-arm-latest
            runner: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: cargo make test-kotlin
        run: cargo make test-kotlin

  # Per-host consumer smoke for the JVM Maven artifact. test-kotlin (above)
  # loads the dev-mode flat libiroh_ffi.so from the resources root; that's not
  # the shape the published jar ships in. This matrix builds the host's
  # release cdylib, stages it under its JNA-platform subdir (the path JNA
  # discovers from classpath at runtime, same as release.yml's stage step),
  # hides the flat lib, and runs the gradle test suite — catching wrong
  # JNA-platform names, staging path typos, or "loads via flat fallback but
  # not from the per-platform subdir."
  # Matrix mirrors release.yml's build-kotlin-cdylib hosts (linux x86_64 /
  # linux aarch64 / macOS arm64 / windows x86_64).
  kotlin-jvm-consumer-smoke:
    name: Kotlin - JVM consumer smoke (${{ matrix.name }})
    timeout-minutes: 30
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: [self-hosted, linux, X64]
            cargo_target: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            runner: [self-hosted, linux, ARM64]
            cargo_target: aarch64-unknown-linux-gnu
          - name: macOS-aarch64
            # `xcode16` selects the native-arm runner pool (the unlabeled
            # macOS/ARM64 pool runs its agent under Rosetta — uname reports
            # x86_64 even on M-series hardware, breaking arch-matching for
            # JNA against the arm64 JVM).
            runner: [self-hosted, macOS, ARM64, xcode16]
            cargo_target: aarch64-apple-darwin
          - name: windows-x86_64
            runner: [windows-latest]
            cargo_target: x86_64-pc-windows-msvc
    defaults:
      run:
        # Git Bash on Windows; matches `bash` on linux/macOS. cargo-make's
        # verify-kotlin-consumer task invokes scripts/verify_kotlin_consumer.sh
        # via `command = "bash"`.
        shell: bash
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Explicit target — the macOS-arm-latest self-hosted runner is
          # running its agent under Rosetta (uname reports x86_64), so without
          # this, cargo's host default would produce an x86_64 dylib that the
          # native-arm64 JVM can't load. The verify script's `--target`
          # invocation requires this target to be installed.
          targets: ${{ matrix.cargo_target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: kotlin-consumer-${{ matrix.name }}
      # cargo install builds cargo-make from source (~3 min cold), works on
      # every host arch we ship. Self-hosted runners persist the binary
      # between jobs; the GH-hosted windows-latest pays the compile each run.
      # taiki-e/install-action@v2 doesn't have an aarch64-linux precompiled
      # cargo-make in its manifest, and davidB/rust-cargo-make@v1 only ships
      # x86_64 binaries.
      - name: Install cargo-make
        shell: bash
        run: |
          if ! command -v cargo-make >/dev/null 2>&1; then
            cargo install --locked cargo-make
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: cargo make verify-kotlin-consumer
        run: cargo make verify-kotlin-consumer

  kotlin-android:
    name: Kotlin - Android cross-build
    timeout-minutes: 45
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        uses: arqu/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r23
          add-to-path: true
      - name: cargo make kotlin-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo make kotlin-android

  # PR-time Android consumer smoke. Cross-builds the natives, stages them
  # under lib/<abi>/, then runs the IrohSmokeTest on an emulator. Mirrors the
  # release.yml verify-kotlin-android-consumer job — same gate, fires on every
  # PR instead of waiting for a release tag.
  kotlin-android-consumer-smoke:
    name: Kotlin - Android consumer smoke (emulator)
    timeout-minutes: 45
    # ubuntu-latest has /dev/kvm via nested-virt — required by
    # android-emulator-runner. The self-hosted linux runner used by
    # kotlin-android above doesn't have KVM enabled.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        uses: arqu/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r23
          add-to-path: true
      - name: Install cargo-ndk
        run: cargo install --version 3.5.4 cargo-ndk --locked
      - name: Cross-build + stage Android natives
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -eu
          # Stage at lib/<abi>/ — where AGP's mergeNativeLibsTask scans JAR
          # deps to pull natives into a consumer APK.
          cargo ndk -o ./_android_libs \
            -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 \
            build --release --lib -p iroh-ffi
          RES=kotlin/lib/src/main/resources
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            install -D -m644 "./_android_libs/$abi/libiroh_ffi.so" "$RES/lib/$abi/libiroh_ffi.so"
          done
          # Composite-build :lib:jar needs the bindings file.
          cargo make bindgen-kotlin
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Android consumer smoke on emulator
        # API 35 / x86_64 / google_apis mirrors n0-computer/iroh's android job.
        # `script:` runs each line as a separate `sh -c`, so state across
        # lines is lost. Delegate to scripts/run_android_smoke.sh so cd +
        # variable assignment + gradlew live in one shell.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-metrics
          disable-animations: true
          script: bash scripts/run_android_smoke.sh
