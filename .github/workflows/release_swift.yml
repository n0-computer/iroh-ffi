name: Release Swift artifact

# Fires on push to `release/v*` branches. Builds the Apple xcframework on CI,
# bakes its SHA into Package.swift (bot commit, `[skip swift-release]` to
# avoid re-firing), and uploads the zip to a draft GitHub release. release.yml
# promotes the draft to published when the tag is pushed — no rebuild, so the
# SHA in Package.swift always matches the shipped zip.

on:
  push:
    branches:
      - 'release/v*'

permissions:
  contents: write

jobs:
  build-and-bake:
    name: Build xcframework + bake SHA + upload draft
    if: "!contains(github.event.head_commit.message, '[skip swift-release]')"
    runs-on: [self-hosted, macOS, ARM64, xcode16]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,aarch64-apple-ios-macabi
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - name: Build xcframework + verify + zip
        run: |
          cargo make swift-xcframework
          cargo make verify-swift-xcframework
          cargo make verify-swift-consumer
          bash scripts/release/zip_xcframework.sh
      - name: Bake SHA into Package.swift
        run: bash scripts/release/swift_bake_sha.sh
      - name: Read release tag from Package.swift
        id: release_tag
        run: |
          V=$(grep -oE 'let releaseTag = "v[^"]+"' Package.swift | sed -E 's/.*"(v[^"]+)"/\1/')
          echo "tag=$V" >> "$GITHUB_OUTPUT"
      - name: Upload zip to draft GitHub release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          body: "Draft release — promoted to published by release.yml on tag push."
          files: IrohLib.xcframework.zip
          fail_on_unmatched_files: true
