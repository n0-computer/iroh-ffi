name: CI Swift

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  IROH_FORCE_STAGING_RELAYS: "1"

jobs:
  swift:
    name: Swift - Full xcframework build + test (iOS + macOS)
    timeout-minutes: 60
    runs-on: [self-hosted, macOS, ARM64, xcode16]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,aarch64-apple-ios-macabi
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - name: cargo make test-swift
        # Builds the full Apple xcframework + runs the IrohLib test suite for
        # macOS via xcodebuild test.
        run: cargo make test-swift
      - name: cargo make verify-swift-xcframework
        # Asserts per-slice bundle layout (shallow iOS, deep macOS — Xcode 27+
        # rejects shallow Info.plist on macOS, iroh-ffi#247).
        run: cargo make verify-swift-xcframework
      - name: cargo make verify-swift-consumer
        # iOS device build + iOS Simulator full test run (boots a sim, runs
        # IrohLibTests on iOS runtime). Catches link errors + iOS-side runtime
        # regressions that macOS-only test-swift can't see.
        run: cargo make verify-swift-consumer
