name: CI JS

env:
  DEBUG: napi:*
  APP_NAME: iroh
  MACOSX_DEPLOYMENT_TARGET: '10.13'

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
    - "v*"
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
      - docs/**
  pull_request:

jobs:
  # Native-arch smoke test: build the host .node via cargo-make (`napi build
  # --platform`) and run the JS test suite. Sanity-checks that local dev
  # (`cargo make test-js`) and the bindings stay in sync, independently of
  # the napi multi-target cross-build matrix below.
  native-test:
    name: JS - Native test (macOS-arm64)
    timeout-minutes: 30
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Enable corepack (yarn)
        run: npm install -g corepack --force && corepack enable
      - name: cargo make test-js
        run: cargo make test-js

  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: '["windows-latest"]'
            build: yarn build
            target: x86_64-pc-windows-msvc
          - host: '["self-hosted","linux","X64"]'
            target: x86_64-unknown-linux-gnu
            build: yarn build --target x86_64-unknown-linux-gnu
          - host: '["self-hosted","linux","X64"]'
            target: x86_64-unknown-linux-musl
            setup: |
              pip3 install ziglang
            build: |-
              set -e
              mkdir -p "$HOME/zigshim"
              printf '#!/bin/sh\nA=;for x in "$@";do case "$x" in --target=*) ;; *) A="$A $x";; esac;done;exec python3 -m ziglang cc -target x86_64-linux-musl $A\n' > "$HOME/zigshim/zcc"
              printf '#!/bin/sh\nA=;for x in "$@";do case "$x" in --target=*) ;; *) A="$A $x";; esac;done;exec python3 -m ziglang c++ -target x86_64-linux-musl $A\n' > "$HOME/zigshim/zcxx"
              chmod +x "$HOME/zigshim/zcc" "$HOME/zigshim/zcxx"
              export CC_x86_64_unknown_linux_musl="$HOME/zigshim/zcc"
              export CXX_x86_64_unknown_linux_musl="$HOME/zigshim/zcxx"
              export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER="$HOME/zigshim/zcc"
              export TARGET_CC="$HOME/zigshim/zcc"
              export TARGET_CXX="$HOME/zigshim/zcxx"
              yarn build --target x86_64-unknown-linux-musl
          - host: '["self-hosted","macOS","ARM64"]'
            target: aarch64-apple-darwin
            build: yarn build --target aarch64-apple-darwin
          - host: '["self-hosted","linux","X64"]'
            target: aarch64-unknown-linux-gnu
            setup: |
              sudo apt-get update
              sudo apt-get -y install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            build: |-
              set -e &&
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc &&
              export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++ &&
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc &&
              yarn build --target aarch64-unknown-linux-gnu --use-napi-cross
          - host: '["self-hosted","linux","X64"]'
            target: armv7-unknown-linux-gnueabihf
            setup: |
              sudo apt-get update
              sudo apt-get install gcc-arm-linux-gnueabihf -y
            build: yarn build --target armv7-unknown-linux-gnueabihf --use-napi-cross
          - host: '["self-hosted","linux","X64"]'
            target: armv7-unknown-linux-musleabihf
            setup: |
              sudo apt-get update
              sudo apt-get -y install binutils-arm-linux-gnueabihf gcc-arm-linux-gnueabihf musl-tools musl-dev
            build: yarn build --target armv7-unknown-linux-musleabihf --use-napi-cross
          - host: '["self-hosted","linux","X64"]'
            target: aarch64-linux-android
            build: yarn build --target aarch64-linux-android
          - host: '["self-hosted","linux","X64"]'
            target: armv7-linux-androideabi
            build: yarn build --target armv7-linux-androideabi
          - host: '["self-hosted","linux","X64"]'
            target: aarch64-unknown-linux-musl
            setup: |
              pip3 install ziglang
            build: |-
              set -e
              mkdir -p "$HOME/zigshim"
              printf '#!/bin/sh\nA=;for x in "$@";do case "$x" in --target=*) ;; *) A="$A $x";; esac;done;exec python3 -m ziglang cc -target aarch64-linux-musl $A\n' > "$HOME/zigshim/zcc"
              printf '#!/bin/sh\nA=;for x in "$@";do case "$x" in --target=*) ;; *) A="$A $x";; esac;done;exec python3 -m ziglang c++ -target aarch64-linux-musl $A\n' > "$HOME/zigshim/zcxx"
              chmod +x "$HOME/zigshim/zcc" "$HOME/zigshim/zcxx"
              export CC_aarch64_unknown_linux_musl="$HOME/zigshim/zcc"
              export CXX_aarch64_unknown_linux_musl="$HOME/zigshim/zcxx"
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER="$HOME/zigshim/zcc"
              export TARGET_CC="$HOME/zigshim/zcc"
              export TARGET_CXX="$HOME/zigshim/zcxx"
              yarn build --target aarch64-unknown-linux-musl
          - host: '["windows-latest"]'
            target: aarch64-pc-windows-msvc
            build: yarn build --target aarch64-pc-windows-msvc
    name: stable - ${{ matrix.settings.target }} - node@24
    runs-on: ${{ fromJSON(matrix.settings.host) }}
    defaults:
      run:
        working-directory: ./iroh-js
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 24
      - name: Enable corepack (yarn)
        if: ${{ !matrix.settings.docker }}
        run: npm install -g corepack --force && corepack enable
        shell: bash
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}
      - uses: goto-bus-stop/setup-zig@v2
        if: ${{ matrix.settings.target == 'armv7-unknown-linux-gnueabihf' || matrix.settings.target == 'armv7-unknown-linux-musleabihf' }}
        with:
          version: 0.11.0
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Setup Android NDK
        if: ${{ contains(matrix.settings.target, 'android') }}
        uses: arqu/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r23
          add-to-path: true
      - name: Setup node x86
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        run: yarn config set supportedArchitectures.cpu "ia32"
        shell: bash
      - name: Install dependencies
        run: yarn install
      - name: Setup node x86
        uses: actions/setup-node@v6
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: 24
          architecture: x86
      - name: Build in docker
        uses: addnab/docker-run-action@v3
        if: ${{ matrix.settings.docker }}
        with:
          image: ${{ matrix.settings.docker }}
          options: '--user 0:0 -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache -v ${{ github.workspace }}/.cargo/registry/index:/usr/local/cargo/registry/index -v ${{ github.workspace }}:/build -w /build'
          run: ${{ matrix.settings.build }}
      - name: Build
        run: ${{ matrix.settings.build }}
        if: ${{ !matrix.settings.docker }}
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_LATEST_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: iroh-js/${{ env.APP_NAME }}.*.node
          if-no-files-found: error
          # Intra-run handoff only: the test-* jobs below download this in the
          # same run. Defaulting to 90d retention accumulated ~9GB of dead
          # per-PR binaries against the account's 2GB Actions storage quota.
          retention-days: 1
  test-macOS-windows-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: '["windows-latest"]'
            target: x86_64-pc-windows-msvc
        node:
          - '24'
          - '26'
    runs-on: ${{ fromJSON(matrix.settings.host) }}
    defaults:
      run:
        working-directory: ./iroh-js
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          architecture: x64
      - name: Enable corepack (yarn)
        run: npm install -g corepack --force && corepack enable
        shell: bash
      - name: Install dependencies
        run: yarn install
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: iroh-js/
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        run: yarn test
  test-linux-x64-gnu-binding:
    name: Test bindings on Linux-x64-gnu - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node:
          - '24'
          - '26'
    runs-on: [self-hosted, linux, X64]
    defaults:
      run:
        working-directory: ./iroh-js
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack (yarn)
        run: npm install -g corepack --force && corepack enable
        shell: bash
      - name: Install dependencies
        run: yarn install
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: iroh-js/
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        # Force amd64: the self-hosted runner also services arm64 binding-test
        # jobs, so `node:N-slim` in the Docker image cache may be the arm64
        # variant of the multi-arch manifest. Without --platform, Docker
        # reuses whichever variant is cached and `process.arch` reports arm64,
        # so napi loads the wrong native binding.
        run: docker run --rm --platform linux/amd64 -v $(pwd):/build -w /build node:${{ matrix.node }}-slim sh -c "npm install -g corepack --force && corepack enable && yarn test"
  test-linux-x64-musl-binding:
    name: Test bindings on x86_64-unknown-linux-musl - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node:
          - '24'
          - '26'
    runs-on: [self-hosted, linux, X64]
    defaults:
      run:
        working-directory: ./iroh-js
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack (yarn)
        run: npm install -g corepack --force && corepack enable
        shell: bash
      - name: Install dependencies
        run: |
          yarn config set supportedArchitectures.libc "musl"
          yarn install
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-musl
          path: iroh-js/
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        # Force amd64 for the same reason as the gnu variant above.
        run: docker run --rm --platform linux/amd64 -v $(pwd):/build -w /build node:${{ matrix.node }}-alpine sh -c "npm install -g corepack --force && corepack enable && yarn test"
  test-linux-aarch64-gnu-binding:
    name: Test bindings on aarch64-unknown-linux-gnu - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node:
          - '24'
          - '26'
    runs-on: [self-hosted, linux, X64]
    defaults:
      run:
        working-directory: ./iroh-js
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack (yarn)
        run: npm install -g corepack --force && corepack enable
        shell: bash
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-aarch64-unknown-linux-gnu
          path: iroh-js/
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Install dependencies
        run: |
          yarn config set supportedArchitectures.cpu "arm64"
          yarn config set supportedArchitectures.libc "glibc"
          yarn install
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
      - name: Setup and run tests
        uses: addnab/docker-run-action@v3
        with:
          image: node:${{ matrix.node }}-slim
          options: '--platform linux/arm64 -v ${{ github.workspace }}/iroh-js:/build -w /build'
          run: |
            set -e
            npm install -g corepack --force
            corepack enable
            yarn test
            ls -la
  test-linux-aarch64-musl-binding:
    name: Test bindings on aarch64-unknown-linux-musl - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node:
          - '24'
          - '26'
    runs-on: [self-hosted, linux, X64]
    defaults:
      run:
        working-directory: ./iroh-js
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack (yarn)
        run: npm install -g corepack --force && corepack enable
        shell: bash
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-aarch64-unknown-linux-musl
          path: iroh-js/
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Install dependencies
        run: |
          yarn config set supportedArchitectures.cpu "arm64"
          yarn config set supportedArchitectures.libc "musl"
          yarn install
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
      - name: Setup and run tests
        uses: addnab/docker-run-action@v3
        with:
          image: node:${{ matrix.node }}-alpine
          options: '--platform linux/arm64 -v ${{ github.workspace }}/iroh-js:/build -w /build'
          run: |
            set -e
            npm install -g corepack --force
            corepack enable
            yarn test
  test-linux-arm-gnueabihf-binding:
    name: Test bindings on armv7-unknown-linux-gnueabihf - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        # Last node with a published linux/arm/v7 docker image is 22; node 24+
        # only ship amd64/arm64 multi-arch manifests for node:*-bullseye-slim.
        node:
          - '22'
    runs-on: [self-hosted, linux, X64]
    defaults:
      run:
        working-directory: ./iroh-js
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Enable corepack (yarn)
        run: npm install -g corepack --force && corepack enable
        shell: bash
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-armv7-unknown-linux-gnueabihf
          path: iroh-js/
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Install dependencies
        run: |
          yarn config set supportedArchitectures.cpu "arm"
          yarn install
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
      - name: Setup and run tests
        uses: addnab/docker-run-action@v3
        with:
          image: node:${{ matrix.node }}-bullseye-slim
          options: '--platform linux/arm/v7 -v ${{ github.workspace }}/iroh-js:/build -w /build'
          run: |
            set -e
            yarn test
            ls -la
  publish:
    name: Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./iroh-js
    needs:
      - test-macOS-windows-binding
      - test-linux-x64-gnu-binding
      - test-linux-x64-musl-binding
      - test-linux-aarch64-gnu-binding
      - test-linux-aarch64-musl-binding
      - test-linux-arm-gnueabihf-binding
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        # Per npm's official Trusted Publishing docs
        # (https://docs.npmjs.com/trusted-publishers): node 24 + setup-node@v6
        # + an explicit registry-url, which together produce the
        # `~/.npmrc` entry that the npm CLI's OIDC token exchange consults.
        # The OIDC exchange itself requires npm 11.5.1+, which ships with
        # node 24 (node 22 still bundles npm 10.x).
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: yarn
          cache-dependency-path: './iroh-js/yarn.lock'
      - name: Install dependencies
        run: yarn install
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: iroh-js/artifacts/
      - name: Move artifacts
        run: yarn artifacts
      - name: Move README # Hack to get npm README to work
        run: cp README.md ../README.md
      - name: Compute npm dist-tag
        # Prerelease versions (e.g. 1.0.0-rc.1) must publish under a non-`latest`
        # dist-tag — npm 11.5+ refuses otherwise. Stable versions go to `latest`.
        id: npm_tag
        if: github.event_name == 'workflow_dispatch' || startsWith(github.event.ref, 'refs/tags/v')
        run: |
          echo "tag=$(node -p "/-/.test(require('./package.json').version) ? 'next' : 'latest'")" >> "$GITHUB_OUTPUT"
      - name: Publish
        # Auth via npm Trusted Publishing (OIDC, no token). Configured per-package
        # at https://www.npmjs.com/package/<pkg>/access → Trusted publishers.
        if: github.event_name == 'workflow_dispatch' || startsWith(github.event.ref, 'refs/tags/v')
        run: npm publish --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_TAG: ${{ steps.npm_tag.outputs.tag }}