# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
commons-math3 = "3.6.1"
guava = "33.2.1-jre"
junit-jupiter-engine = "5.10.3"

[libraries]
commons-math3 = { module = "org.apache.commons:commons-math3", version.ref = "commons-math3" }
guava = { module = "com.google.guava:guava", version.ref = "guava" }
junit-jupiter-engine = { module = "org.junit.jupiter:junit-jupiter-engine", version.ref = "junit-jupiter-engine" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version = "2.2.21" }
# Same Kotlin version as kotlin-jvm — the AAR's compiled metadata must be
# readable by the JVM jar's consumers and vice versa.
kotlin-android = { id = "org.jetbrains.kotlin.android", version = "2.2.21" }
# AGP 8.13 supports Kotlin 2.2.x + Gradle 8.14+ (root wrapper version above).
android-library = { id = "com.android.library", version = "8.13.2" }
android-application = { id = "com.android.application", version = "8.13.2" }
dokka = { id = "org.jetbrains.dokka", version = "2.2.0" }
maven-publish = { id = "com.vanniktech.maven.publish", version = "0.37.0" }
