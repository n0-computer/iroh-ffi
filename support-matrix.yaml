# Single, hand-maintained source for the docs landing page (scripts/docs/gen_landing.py).
# `iroh-ffi` exposes the same iroh 1.0 surface through every binding, so the
# matrix is currently uniform — keep it honest if a feature lands unevenly.
#
# Each language links out to where its API reference is hosted. Swift is also
# on the Swift Package Index, but every language's primary docs are the
# self-hosted GitHub Pages copy under ./<id>/ so they are always current.

languages:
  - id: swift
    name: Swift
    docs: ./swift/documentation/irohlib/
    extra:
      label: "also on Swift Package Index"
      url: "https://swiftpackageindex.com/n0-computer/iroh-ffi/documentation"
  - id: kotlin
    name: Kotlin
    docs: ./kotlin/
  - id: python
    name: Python
    docs: ./python/
  - id: js
    name: JavaScript
    docs: ./js/

features:
  - name: Endpoints
    support: { swift: true, kotlin: true, python: true, js: true }
  - name: Protocols (accept loop / ALPN)
    support: { swift: true, kotlin: true, python: true, js: true }
  - name: Connections & multipath
    support: { swift: true, kotlin: true, python: true, js: true }
  - name: Custom relays (full RelayMap)
    support: { swift: true, kotlin: true, python: true, js: true }
  - name: iroh-services binding
    support: { swift: true, kotlin: true, python: true, js: true }
